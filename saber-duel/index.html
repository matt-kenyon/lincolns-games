let titleTime = 0;

function bounceOut(x) {
    const n1 = 7.5625, d1 = 2.75;
    if (x < 1 / d1) return n1 * x * x;
    else if (x < 2 / d1) return n1 * (x -= 1.5 / d1) * x + 0.75;
    else if (x < 2.5 / d1) return n1 * (x -= 2.25 / d1) * x + 0.9375;
    else return n1 * (x -= 2.625 / d1) * x + 0.984375;
}

function drawTitleSaberUnit(hiltX, hiltY, tipX, tipY, progress, bladeColor, glowColor, tipGlow, hiltStyle) {
    const dx = tipX - hiltX, dy = tipY - hiltY;
    const angle = Math.atan2(dy, dx);
    const fullLen = Math.sqrt(dx * dx + dy * dy);
    const len = fullLen * progress;

    ctx.save();
    ctx.translate(hiltX, hiltY);
    ctx.rotate(angle);

    // Hilt
    ctx.globalAlpha = 1;
    ctx.fillStyle = hiltStyle === 'light' ? '#888888' : '#666666';
    ctx.fillRect(-14, -2.5, 14, 5);
    ctx.fillStyle = hiltStyle === 'light' ? '#666666' : '#555555';
    ctx.fillRect(-13, -3, 2, 6);
    ctx.fillRect(-9, -3, 2, 6);
    ctx.fillRect(-5, -3, 2, 6);
    ctx.fillStyle = hiltStyle === 'light' ? '#aaaaaa' : '#888888';
    ctx.fillRect(-1, -3, 2, 6);
    ctx.fillStyle = hiltStyle === 'light' ? '#777777' : '#555555';
    ctx.fillRect(-15, -2, 2, 4);

    // Blade
    if (progress > 0) {
        ctx.shadowBlur = 18;
        ctx.shadowColor = glowColor;
        ctx.strokeStyle = bladeColor;
        ctx.lineWidth = 5;
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.moveTo(1, 0);
        ctx.lineTo(1 + len, 0);
        ctx.stroke();

        ctx.globalAlpha = 0.9;
        ctx.shadowBlur = 12;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(1, 0);
        ctx.lineTo(1 + len, 0);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(1, 0);
        ctx.lineTo(1 + len, 0);
        ctx.stroke();

        ctx.shadowBlur = 8;
        ctx.shadowColor = tipGlow;
        ctx.fillStyle = tipGlow;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(1 + len, 0, 2.5, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function drawTitle(dt) {
    drawBackground();
    titleTime += dt;
    const tt = titleTime;

    // Logo entrance — slams in with bounce
    const introEnd = 0.8;
    let logoScale = 1, logoAlpha = 1;
    if (tt < introEnd) {
        const p = tt / introEnd;
        logoScale = 3 - 2 * bounceOut(p);
        logoAlpha = Math.min(1, p * 3);
    }
    const glowPulse = tt > introEnd ? 8 + Math.sin((tt - introEnd) * 3) * 4 : 0;

    ctx.save();
    ctx.translate(W / 2, 85);
    ctx.scale(logoScale, logoScale);
    ctx.globalAlpha = logoAlpha;
    ctx.shadowBlur = 15 + glowPulse;
    ctx.shadowColor = '#ff8800';
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SABER DUEL', 0, 0);
    ctx.shadowBlur = 0;
    ctx.fillText('SABER DUEL', 0, 0);
    ctx.restore();

    // Crossed lightsabers — ignite from hilts after logo lands
    const blueIgniteStart = introEnd + 0.15;
    const redIgniteStart = introEnd + 0.35;
    const igniteDuration = 0.25;
    const saberLen = 55;
    const scx = W / 2, scy = 130;
    const halfAngle = 0.45;

    const blueHiltX = scx - Math.cos(halfAngle) * saberLen;
    const blueHiltY = scy + Math.sin(halfAngle) * saberLen;
    const blueTipX = scx + Math.cos(halfAngle) * saberLen;
    const blueTipY = scy - Math.sin(halfAngle) * saberLen;
    const redHiltX = scx + Math.cos(halfAngle) * saberLen;
    const redHiltY = scy + Math.sin(halfAngle) * saberLen;
    const redTipX = scx - Math.cos(halfAngle) * saberLen;
    const redTipY = scy - Math.sin(halfAngle) * saberLen;

    const blueProgress = Math.min(1, Math.max(0, (tt - blueIgniteStart) / igniteDuration));
    const redProgress = Math.min(1, Math.max(0, (tt - redIgniteStart) / igniteDuration));

    if (tt > blueIgniteStart - 0.05) {
        drawTitleSaberUnit(blueHiltX, blueHiltY, blueTipX, blueTipY, blueProgress,
            '#5599ff', '#2266ff', '#88bbff', 'light');
    }
    if (tt > redIgniteStart - 0.05) {
        drawTitleSaberUnit(redHiltX, redHiltY, redTipX, redTipY, redProgress,
            '#ff5555', '#dd0000', '#ff8888', 'dark');
    }

    // Clash flare
    if (blueProgress >= 1 && redProgress >= 1) {
        const clashAge = tt - redIgniteStart - igniteDuration;
        ctx.save();

        // Initial flash
        if (clashAge < 0.4) {
            const f = 1 - clashAge / 0.4;
            ctx.globalAlpha = f * 0.9;
            ctx.shadowBlur = 50;
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(scx, scy, 20 + f * 30, 0, Math.PI * 2);
            ctx.fill();
        }

        // Fast pulsating flare
        const p1 = Math.sin(tt * 28) * 0.5 + 0.5;
        const p2 = Math.sin(tt * 37 + 0.8) * 0.5 + 0.5;
        const p3 = Math.sin(tt * 19 + 2.1) * 0.5 + 0.5;
        const pulse = 0.4 + (p1 * 0.4 + p2 * 0.35 + p3 * 0.25) * 0.6;

        const flareR = 15 + pulse * 4;
        const flareGrad = ctx.createRadialGradient(scx, scy, 0, scx, scy, flareR);
        const midAlpha = 0.25 + pulse * 0.1;
        const outerAlpha = 0.08 + pulse * 0.06;
        flareGrad.addColorStop(0, 'rgba(255,255,255,1)');
        flareGrad.addColorStop(0.12, `rgba(255,255,255,${0.85 + pulse * 0.15})`);
        flareGrad.addColorStop(0.3, `rgba(255,252,240,${0.5 + pulse * 0.15})`);
        flareGrad.addColorStop(0.5, `rgba(255,240,210,${midAlpha})`);
        flareGrad.addColorStop(0.75, `rgba(255,210,150,${outerAlpha})`);
        flareGrad.addColorStop(1, 'rgba(255,180,110,0)');
        ctx.shadowBlur = 15 + pulse * 5;
        ctx.shadowColor = '#ffaa44';
        ctx.fillStyle = flareGrad;
        ctx.beginPath();
        ctx.arc(scx, scy, flareR, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.restore();
    }

    // Subtitle
    if (tt > introEnd + 0.5) {
        const subAlpha = Math.min(1, (tt - introEnd - 0.5) / 0.4);
        ctx.globalAlpha = subAlpha;
        ctx.fillStyle = '#888';
        ctx.font = '10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('A GAME BY LINCOLN', W / 2, 175);
        ctx.globalAlpha = 1;
    }

    // Press enter — pulsing
    if (tt > 2) {
        const pulse = Math.sin(tt * 3) * 0.3 + 0.7;
        const scalePulse = 1 + Math.sin(tt * 3) * 0.03;
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.translate(W / 2, 210);
        ctx.scale(scalePulse, scalePulse);
        ctx.fillStyle = '#aaa';
        ctx.font = '12px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('PRESS ENTER TO START', 0, 0);
        ctx.restore();
    }

    // Controls hint
    if (tt > 2.5) {
        ctx.globalAlpha = Math.min(1, (tt - 2.5) / 0.5) * 0.5;
        ctx.fillStyle = '#555';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('J:SLASH K:BLOCK SPACE:JUMP L:FORCE F:GUN G:SHOOT H:NUKE', W / 2, 235);
        ctx.globalAlpha = 1;
    }
}

    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('TRUE MASTER OF THE FORCE', W / 2, 135);

    // Draw the player's character
    const pSprites = getCharSprites(playerChar);
    const pSpr = pSprites.idle;
    drawSprite(pSpr, W / 2 - pSpr.w * 1.5, 150, 3, false);

    if (stateTimer > 2 && Math.floor(stateTimer * 2) % 2 === 0) {
        ctx.fillStyle = '#888';
        ctx.font = '12px monospace';
        ctx.fillText('PRESS ENTER TO PLAY AGAIN', W / 2, 240);
    }
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
    switch (gameState) {
        case 'title':
            if (pressedEnter()) {
                ensureAudio();
                sfxConfirm();
                gameState = 'select';
                selectSide = 'light';
                selectBlink = 0;
            }
            break;

        case 'select':
            if (justPressed['ArrowLeft'] || justPressed['KeyA']) { selectSide = 'light'; sfxSelect(); }
            if (justPressed['ArrowRight'] || justPressed['KeyD']) { selectSide = 'dark'; sfxSelect(); }
            if (justPressed['Escape']) {
                sfxSelect();
                gameState = 'title';
                titleTime = 0;
            }
            if (justPressed['Enter']) {
                sfxConfirm();
                playerSide = selectSide;
                charSelectIndex = 0;
                charSelectBlink = 0;
                gameState = 'charSelect';
            }
            break;

        case 'charSelect': {
            const roster = CHARACTERS[playerSide];
            if (justPressed['ArrowLeft'] || justPressed['KeyA']) {
                charSelectIndex = (charSelectIndex - 1 + roster.length) % roster.length;
                sfxSelect();
            }
            if (justPressed['ArrowRight'] || justPressed['KeyD']) {
                charSelectIndex = (charSelectIndex + 1) % roster.length;
                sfxSelect();
            }
            if (justPressed['Escape']) {
                sfxSelect();
                gameState = 'select';
            }
            if (justPressed['Enter']) {
                sfxConfirm();
                playerChar = roster[charSelectIndex];
                if (playerChar.lightning) {
                    // Palpatine uses lightning — skip saber select
                    playerSaberColor = playerChar.defaultSaber;
                    currentLevel = 1;
                    initFight();
                    startMusic();
                } else if (playerChar.fourSabers) {
                    // Grievous — pick 4 saber colors
                    grievousSabers = [ALL_SABERS[0], ALL_SABERS[1], ALL_SABERS[2], ALL_SABERS[3]];
                    grievousSlot = 0;
                    grievousSelectBlink = 0;
                    gameState = 'grievousSelect';
                } else {
                    saberColorIndex = 0;
                    saberSelectBlink = 0;
                    gameState = 'saberSelect';
                }
            }
            break;
        }

        case 'grievousSelect': {
            // Up/down to switch slot, left/right to change color
            if (justPressed['ArrowUp'] || justPressed['KeyW']) {
                grievousSlot = (grievousSlot - 1 + 4) % 4;
                sfxSelect();
            }
            if (justPressed['ArrowDown'] || justPressed['KeyS']) {
                grievousSlot = (grievousSlot + 1) % 4;
                sfxSelect();
            }
            if (justPressed['ArrowLeft'] || justPressed['KeyA']) {
                const cur = ALL_SABERS.findIndex(s => s.name === grievousSabers[grievousSlot].name);
                grievousSabers[grievousSlot] = ALL_SABERS[(cur - 1 + ALL_SABERS.length) % ALL_SABERS.length];
                sfxSelect();
            }
            if (justPressed['ArrowRight'] || justPressed['KeyD']) {
                const cur = ALL_SABERS.findIndex(s => s.name === grievousSabers[grievousSlot].name);
                grievousSabers[grievousSlot] = ALL_SABERS[(cur + 1) % ALL_SABERS.length];
                sfxSelect();
            }
            if (justPressed['Escape']) {
                sfxSelect();
                gameState = 'charSelect';
            }
            if (justPressed['Enter']) {
                sfxConfirm();
                playerSaberColor = grievousSabers[0];
                currentLevel = 1;
                initFight();
                startMusic();
            }
            break;
        }

        case 'saberSelect': {
            const opts = playerSide === 'light' ? LIGHT_SABERS : DARK_SABERS;
            if (justPressed['ArrowLeft'] || justPressed['KeyA']) {
                saberColorIndex = (saberColorIndex - 1 + opts.length) % opts.length;
                sfxSelect();
            }
            if (justPressed['ArrowRight'] || justPressed['KeyD']) {
                saberColorIndex = (saberColorIndex + 1) % opts.length;
                sfxSelect();
            }
            if (justPressed['Escape']) {
                sfxSelect();
                gameState = 'charSelect';
            }
            if (justPressed['Enter']) {
                sfxConfirm();
                playerSaberColor = opts[saberColorIndex];
                currentLevel = 1;
                initFight();
                startMusic();
            }
            break;
        }

        case 'versus':
            stateTimer += dt;
            if (stateTimer > 2) {
                countdownTimer = 2.5;
                gameState = 'countdown';
            }
            break;

        case 'countdown': {
            const prevNum = Math.ceil(countdownTimer);
            countdownTimer -= dt;
            const newNum = Math.ceil(countdownTimer);
            if (newNum !== prevNum && newNum > 0) sfxCountdown();
            if (prevNum > 0 && newNum <= 0) sfxFight();
            if (countdownTimer <= -0.5) {
                gameState = 'fighting';
            }
            break;
        }

        case 'fighting':
            handlePlayerInput(player);
            updateAI(enemy, player, dt);
            updateFighter(player, dt);
            updateFighter(enemy, dt);
            updateParticles(dt);
            updateTies(dt);
            updateBlasterBolts(dt);
            updateNuke(dt);

            // Check attacks
            if (player.state === 'slashing') checkAttackHit(player, enemy);
            if (enemy.state === 'slashing') checkAttackHit(enemy, player);

            // Screen shake decay
            if (screenShake > 0) screenShake -= dt;

            // Win/lose check
            if (enemy.hp <= 0 && enemy.state === 'ko') {
                if (currentLevel >= maxLevel) {
                    gameState = 'victory';
                    stateTimer = 0;
                    victoryParticleTimer = 0;
                    particles = [];
                    sfxWin();
                    stopMusic();
                } else {
                    gameState = 'win';
                    stateTimer = 0;
                    sfxWin();
                }
            }
            if (player.hp <= 0 && player.state === 'ko') {
                gameState = 'lose';
                stateTimer = 0;
                sfxLose();
                stopMusic();
            }
            break;

        case 'win':
            updateParticles(dt);
            if (stateTimer > 1 && pressedEnter()) {
                currentLevel++;
                initFight();
            }
            break;

        case 'lose':
            updateParticles(dt);
            if (stateTimer > 1 && pressedEnter()) {
                currentLevel = 1;
                initFight();
            }
            break;

        case 'victory':
            updateParticles(dt);
            if (stateTimer > 2 && pressedEnter()) {
                sfxConfirm();
                gameState = 'title';
                titleTime = 0;
                particles = [];
            }
            break;
    }
}

// ============================================================
// MAIN RENDER
// ============================================================
function render(dt) {
    ctx.save();

    // Screen shake
    if (screenShake > 0) {
        const shakeX = (Math.random() - 0.5) * 6;
        const shakeY = (Math.random() - 0.5) * 6;
        ctx.translate(shakeX, shakeY);
    }

    switch (gameState) {
        case 'title':
            drawTitle(dt);
            break;
        case 'select':
            drawSelect(dt);
            break;
        case 'charSelect':
            drawCharSelect(dt);
            break;
        case 'saberSelect':
            drawSaberSelect(dt);
            break;
        case 'grievousSelect':
            drawGrievousSelect(dt);
            break;
        case 'versus':
            drawVersus(dt);
            break;
        case 'countdown':
            drawCountdown(dt);
            break;
        case 'fighting':
            drawBackground();
            drawFighter(player);
            drawFighter(enemy);
            drawBlasterBolts();
            drawNuke();
            drawParticles();
            drawHUD();
            break;
        case 'win':
            drawWin(dt);
            break;
        case 'lose':
            drawLose(dt);
            break;
        case 'victory':
            drawVictory(dt);
            break;
    }

    ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    gameTime += dt;

    update(dt);
    render(dt);
    clearJustPressed();

    requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame((timestamp) => {
    lastTime = timestamp;
    gameLoop(timestamp);
});
</script>

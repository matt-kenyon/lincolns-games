let audioCtx = null;

function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration, type, volume, ramp) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (ramp) osc.frequency.exponentialRampToValueAtTime(ramp, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(volume || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playNoise(duration, volume) {
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(volume || 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    // Bandpass for a "whoosh" feel
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 0.5;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
    source.stop(audioCtx.currentTime + duration);
}

function sfxSlash() {
    // Saber swoosh — filtered noise + descending tone
    playNoise(0.2, 0.12);
    playTone(600, 0.15, 'sawtooth', 0.06, 200);

function sfxNukeLaunch() {

// Background chiptune music
let musicPlaying = false;
let musicInterval = null;
let musicStep = 0;
let musicGainNode = null;

// Epic space battle chiptune — original melody, Star Wars vibe
// Notes in Hz (0 = rest)
const MELODY = [
    // Phrase 1 — dramatic rising theme
    330, 330, 494, 494, 440, 440, 392, 392,
    330, 330, 494, 494, 659, 659, 622, 622,
    // Phrase 2 — tension building
    587, 587, 494, 494, 440, 440, 392, 392,
    370, 370, 330, 330, 294, 294, 330, 330,
    // Phrase 3 — heroic repeat with variation
    330, 330, 494, 494, 440, 440, 523, 523,
    587, 587, 659, 659, 587, 587, 494, 494,
    // Phrase 4 — resolving
    440, 440, 392, 392, 370, 370, 330, 330,
    392, 392, 440, 440, 330, 330, 0, 0,
];

const BASS = [
    // Phrase 1
    165, 0, 165, 0, 147, 0, 131, 0,
    165, 0, 165, 0, 220, 0, 208, 0,
    // Phrase 2
    196, 0, 165, 0, 147, 0, 131, 0,
    123, 0, 110, 0, 98, 0, 110, 0,
    // Phrase 3
    165, 0, 165, 0, 147, 0, 175, 0,
    196, 0, 220, 0, 196, 0, 165, 0,
    // Phrase 4
    147, 0, 131, 0, 123, 0, 110, 0,
    131, 0, 147, 0, 110, 0, 0, 0,
];

function startMusic() {
    if (musicPlaying || !audioCtx) return;
    musicPlaying = true;
    musicStep = 0;

    // Master gain for music
    musicGainNode = audioCtx.createGain();
    musicGainNode.gain.value = 1;
    musicGainNode.connect(audioCtx.destination);

    const BPM = 180;
    const stepTime = 60 / BPM; // seconds per step

    musicInterval = setInterval(() => {
        if (!audioCtx || !musicPlaying) return;

        const mel = MELODY[musicStep % MELODY.length];
        const bas = BASS[musicStep % BASS.length];

        // Melody voice — square wave
        if (mel > 0) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = mel;
            gain.gain.setValueAtTime(0.07, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + stepTime * 0.9);
            osc.connect(gain);
            gain.connect(musicGainNode);
            osc.start();
            osc.stop(audioCtx.currentTime + stepTime * 0.9);
        }

        // Bass voice — triangle wave
        if (bas > 0) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = bas;
            gain.gain.setValueAtTime(0.09, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + stepTime * 0.9);
            osc.connect(gain);
            gain.connect(musicGainNode);
            osc.start();
            osc.stop(audioCtx.currentTime + stepTime * 0.9);
        }

        // Percussion — noise hit on every 4th step
        if (musicStep % 4 === 0) {
            const bufLen = audioCtx.sampleRate * 0.05;
            const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
            const src = audioCtx.createBufferSource();
            src.buffer = buf;
            const g = audioCtx.createGain();
            g.gain.setValueAtTime(0.06, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            src.connect(g);
            g.connect(musicGainNode);
            src.start();
        }

        musicStep++;
    }, stepTime * 1000);
}

function stopMusic() {
    musicPlaying = false;
    if (musicInterval) {
        clearInterval(musicInterval);
        musicInterval = null;
    }
    if (musicGainNode) {
        musicGainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }
}

function setMusicVolume(vol) {
    if (musicGainNode) {
        musicGainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
    }
}

// ============================================================
// SPRITE DEFINITIONS (ASCII pixel art)
// ============================================================
// Legend: . = transparent, other chars map to colors per character

function parseSprite(ascii, colorMap) {
    const rows = ascii.trim().split('\n').map(r => r.trim());
    const h = rows.length;
    const w = Math.max(...rows.map(r => r.length));
    const pixels = [];
    for (let y = 0; y < h; y++) {
        pixels[y] = [];
        for (let x = 0; x < w; x++) {
            const ch = rows[y][x] || '.';
            pixels[y][x] = ch === '.' ? null : (colorMap[ch] || null);
        }
    }
    return { pixels, w, h };
}

// Sprite cache per character
const spriteCache = {};

function getCharSprites(char) {
    if (spriteCache[char.id]) return spriteCache[char.id];

    // Pick the right sprite set
    let spriteSet = SPRITE_DATA;
    if (char.id === 'yoda') spriteSet = YODA_SPRITES;
    else if (char.id === 'maul') spriteSet = MAUL_SPRITES;

    // Build color map — add special chars per character
    const colorMap = { ...char.colors };
    if (char.id === 'maul') colorMap['M'] = '#ffaa00';
    if (char.id === 'yoda') colorMap['E'] = '#5a8a3a';
    // Vader's extra colors are already in his color map (C, V, D, L, N, W, A, K)

    const sprites = {};
    for (const [name, ascii] of Object.entries(spriteSet)) {
        sprites[name] = parseSprite(ascii, colorMap);
    }
    spriteCache[char.id] = sprites;
    return sprites;
}

// ============================================================
// DRAW SPRITE (with flip support)
// ============================================================
function drawSprite(sprite, x, y, scale, flip, saberOverride, originalSaberColor) {
    const { pixels, w, h } = sprite;
    for (let py = 0; py < h; py++) {
        for (let px = 0; px < w; px++) {
            let color = pixels[py][px];
            if (!color) continue;
            // Override saber color pixels with chosen color
            if (saberOverride && originalSaberColor && color === originalSaberColor) {
                color = saberOverride;
            } else if (saberOverride && (color === COLORS.lightSaber || color === COLORS.darkSaber)) {
                color = saberOverride;
            }
            const drawX = flip
                ? x + (w - 1 - px) * scale
                : x + px * scale;
            const drawY = y + py * scale;
            ctx.fillStyle = color;
            ctx.fillRect(drawX, drawY, scale, scale);
        }
    }
}

function getSaberColor(fighter, index) {
    // Grievous has 4 sabers — index selects which one
    if (fighter.isPlayer && fighter.char && fighter.char.fourSabers && grievousSabers[0]) {
        return grievousSabers[index || 0];
    }
    if (fighter.isPlayer && playerSaberColor) return playerSaberColor;
    if (!fighter.isPlayer && fighter.char) return fighter.char.defaultSaber;

    return fighter.side === 'light'
        ? { color: COLORS.lightSaber, glow: COLORS.lightGlow }
        : { color: COLORS.darkSaber, glow: COLORS.darkGlow };
}

];

function getDifficulty() {
    return DIFFICULTY[Math.min(currentLevel - 1, DIFFICULTY.length - 1)];
}

// ============================================================
// FIGHTERS
// ============================================================
let player, enemy;

function initFight() {
    const diff = getDifficulty();
    loadLevel(currentLevel);
    const pSide = playerSide;
    const eSide = pSide === 'light' ? 'dark' : 'light';

    player = createFighter(50, pSide, true, playerChar);
    // Pick a random enemy character from the other side
    const enemyRoster = CHARACTERS[eSide];
    enemyChar = enemyRoster[Math.floor(Math.random() * enemyRoster.length)];
    enemy = createFighter(W - 50 - FIGHTER_W, eSide, false, enemyChar);
    enemy.hp = diff.hp;
    enemy.maxHp = diff.hp;
    enemy.displayHp = diff.hp;

    // Face each other
    player.facing = 1;
    enemy.facing = -1;

    particles = [];
    blasterBolts = [];
    nukeAvailable = true;
    enemyNukeAvailable = true;
    nukeActive = false;
    nukeBolt = null;
    stateTimer = 0;
    gameState = 'versus';
}

// ============================================================
// COMBAT
// ============================================================
function trySlash(fighter) {
    if (fighter.state === 'slashing' || fighter.state === 'blocking' || fighter.state === 'hit' || fighter.state === 'ko') return;
    if (fighter.attackCooldown > 0) return;
    fighter.state = 'slashing';
    fighter.stateTimer = ATTACK_DURATION;
    fighter.hitDealt = false;
    if (fighter.char && fighter.char.lightning) {
        sfxLightning();
    } else {
        sfxSlash();
    }
}

function tryBlock(fighter) {
    if (fighter.state === 'slashing' || fighter.state === 'hit' || fighter.state === 'ko') return;
    if (fighter.blockCooldown > 0) return;
    fighter.state = 'blocking';
    fighter.blockTime = 0;
}

function stopBlock(fighter) {
    if (fighter.state === 'blocking') {
        fighter.state = 'idle';
        if (fighter.blockTime > 0.3) fighter.blockCooldown = BLOCK_COOLDOWN;
    }
}

function tryJump(fighter) {
    if (fighter.state === 'hit' || fighter.state === 'ko') return;
    if (!fighter.grounded && fighter.hasDoubleJumped) return; // already used double jump
    if (!fighter.grounded) {
        // Double jump
        fighter.hasDoubleJumped = true;
        fighter.vy = JUMP_VEL * 0.85; // slightly weaker second jump
        sfxJump();
        return;
    }
    fighter.vy = JUMP_VEL;
    fighter.grounded = false;
    fighter.hasDoubleJumped = false;
    if (fighter.state !== 'slashing') fighter.state = 'jumping';
    sfxJump();
}

function toggleGun(fighter) {
    if (fighter.state === 'hit' || fighter.state === 'ko' || fighter.state === 'slashing') return;
    fighter.gunDrawn = !fighter.gunDrawn;
    sfxGunDraw();
    if (fighter.state === 'blocking') {
        fighter.state = 'idle';
    }
}

function tryShoot(fighter) {
    if (!fighter.gunDrawn) return;
    if (fighter.state === 'hit' || fighter.state === 'ko') return;
    if (fighter.shootCooldown > 0) return;

    fighter.shootCooldown = BLASTER_COOLDOWN;
    sfxBlaster();

    // Create a blaster bolt
    const dir = fighter.facing;
    const bx = dir === 1 ? fighter.x + FIGHTER_W + 2 : fighter.x - 2;
    const by = fighter.y + FIGHTER_H / 2 - 2;
    const boltColor = fighter.side === 'light' ? '#44ff44' : '#ff4444'; // green for good guys, red for bad
    const boltGlow = fighter.side === 'light' ? '#22aa22' : '#dd0000';

    blasterBolts.push({
        x: bx, y: by,
        vx: BLASTER_SPEED * dir,
        color: boltColor,
        glow: boltGlow,
        owner: fighter,
        life: 2, // seconds before despawn
    });
}

function updateBlasterBolts(dt) {
    for (let i = blasterBolts.length - 1; i >= 0; i--) {
        const b = blasterBolts[i];
        b.x += b.vx * dt;
        b.life -= dt;

        // Off screen or expired
        if (b.x < -10 || b.x > W + 10 || b.life <= 0) {
            blasterBolts.splice(i, 1);
            continue;
        }

        // Check hit against the OTHER fighter
        const target = b.owner === player ? enemy : player;
        if (b.x > target.x && b.x < target.x + FIGHTER_W &&
            b.y > target.y && b.y < target.y + FIGHTER_H) {

            if (target.state === 'blocking') {
                // Blocked — deflect the bolt
                b.vx = -b.vx * 0.8;
                b.owner = target; // now it can hit the original shooter
                spawnParticles(b.x, b.y, 4, '#ffff44', '#ffaa00');
                sfxBlock();
            } else {
                // Hit!
                target.hp = Math.max(0, target.hp - BLASTER_DAMAGE);
                target.state = 'hit';
                target.stateTimer = HIT_STUN;
                spawnParticles(b.x, b.y, 6, b.color, '#ffffff');
                screenShake = 0.1;
                sfxHit();
                blasterBolts.splice(i, 1);
            }
        }
    }
}

function drawBlasterBolts() {
    for (const b of blasterBolts) {
        ctx.save();
        ctx.shadowBlur = 8;
        ctx.shadowColor = b.glow;
        ctx.fillStyle = b.color;
        // Elongated bolt shape
        const len = 8;
        const h = 2;
        const dir = b.vx > 0 ? 1 : -1;
        ctx.fillRect(b.x - (dir === 1 ? len : 0), b.y, len, h);
        // Bright core
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(b.x - (dir === 1 ? len / 2 : -len / 2 + 2), b.y, len / 2, h);
        ctx.restore();
    }
}

function tryNuke(fighter, target) {
    if (!nukeAvailable || nukeActive || nukeBolt) return;
    if (fighter.state === 'hit' || fighter.state === 'ko') return;

    nukeAvailable = false;
    sfxNukeLaunch();

    // Launch a slow glowing projectile toward the enemy
    const dir = fighter.facing;
    nukeBolt = {
        x: fighter.x + (dir === 1 ? FIGHTER_W : 0),
        y: fighter.y + FIGHTER_H / 2,
        vx: 200 * dir,
        target: target,
    };
}

function updateNuke(dt) {
    // Update traveling nuke bolt
    if (nukeBolt) {
        nukeBolt.x += nukeBolt.vx * dt;

        // Trail particles
        spawnParticles(nukeBolt.x, nukeBolt.y, 1, '#4466ff', '#2244cc');

        // Check if it hits the target
        const t = nukeBolt.target;
        if (nukeBolt.x > t.x && nukeBolt.x < t.x + FIGHTER_W &&
            nukeBolt.y > t.y && nukeBolt.y < t.y + FIGHTER_H) {
            // BOOM — explode at target position
            nukeX = t.x + FIGHTER_W / 2;
            nukeY = t.y + FIGHTER_H / 2;
            nukeActive = true;
            nukeTimer = 0;
            nukeBolt = null;
            sfxNukeExplode();

            // Deal half of target's current HP
            const dmg = Math.ceil(t.hp / 2);
            t.hp = Math.max(1, t.hp - dmg);
            t.state = 'hit';
            t.stateTimer = 0.5;
            screenShake = 0.5;

            // Massive particle explosion
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 30 + Math.random() * 200;
                const colors = ['#4488ff', '#66aaff', '#2244cc', '#88ccff', '#ffffff'];
                particles.push({
                    x: nukeX, y: nukeY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 30,
                    life: 0.5 + Math.random() * 0.8,
                    maxLife: 0.5 + Math.random() * 0.8,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: 1 + Math.random() * 3,
                });
            }
        }

        // Off screen — explode harmlessly
        if (nukeBolt && (nukeBolt.x < -20 || nukeBolt.x > W + 20)) {
            nukeBolt = null;
        }
    }

    // Update explosion animation
    if (nukeActive) {
        nukeTimer += dt;
        if (nukeTimer > 1.2) {
            nukeActive = false;
        }
    }
}

function drawNuke() {
    // Draw traveling bolt
    if (nukeBolt) {
        ctx.save();
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#4488ff';
        // Glowing orb
        ctx.fillStyle = '#88bbff';
        ctx.beginPath();
        ctx.arc(nukeBolt.x, nukeBolt.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(nukeBolt.x, nukeBolt.y, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    // Draw explosion
    if (nukeActive) {
        const progress = nukeTimer / 1.2;
        const radius = progress < 0.3
            ? (progress / 0.3) * 80  // expand fast
            : 80 - (progress - 0.3) / 0.7 * 80; // shrink

        ctx.save();
        // Outer blue glow
        ctx.globalAlpha = (1 - progress) * 0.6;
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#4488ff';
        ctx.fillStyle = '#2244cc';
        ctx.beginPath();
        ctx.arc(nukeX, nukeY, radius, 0, Math.PI * 2);
        ctx.fill();
        // Inner bright core
        ctx.globalAlpha = (1 - progress) * 0.8;
        ctx.fillStyle = '#88ccff';
        ctx.beginPath();
        ctx.arc(nukeX, nukeY, radius * 0.5, 0, Math.PI * 2);
        ctx.fill();
        // White flash center
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(nukeX, nukeY, radius * 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function tryForcePush(fighter, target) {
    if (fighter.state === 'hit' || fighter.state === 'ko' || fighter.state === 'slashing') return;
    if (fighter.forceCooldown > 0) return;

    fighter.forceCooldown = FORCE_COOLDOWN;
    fighter.forceTimer = FORCE_DURATION;
    sfxForcePush();

    // Push the target hard across the screen
    const dir = fighter.x < target.x ? 1 : -1;
    target.x += dir * FORCE_PUSH_POWER;
    target.x = Math.max(10, Math.min(W - FIGHTER_W - 10, target.x));

    // Knock them up slightly
    if (target.grounded) {
        target.vy = -120;
        target.grounded = false;
    }

    // Small damage + hit stun
    target.hp = Math.max(0, target.hp - FORCE_PUSH_DAMAGE);
    target.state = 'hit';
    target.stateTimer = HIT_STUN * 1.5;

    // Force wave particles
    const waveX = fighter.x + (dir === 1 ? FIGHTER_W + 5 : -5);
    const waveY = fighter.y + FIGHTER_H / 3;
    spawnParticles(waveX, waveY, 12, '#aaccff', '#6688cc');
    // Impact particles on the target
    spawnParticles(target.x + FIGHTER_W / 2, target.y + FIGHTER_H / 3, 8, '#88aadd', '#446688');

    screenShake = 0.2;
}

function applyDamage(attacker, defender, baseDamage) {
    let dmg = baseDamage;
    const isLightningAttack = attacker.char && attacker.char.lightning;
    if (defender.state === 'blocking') {
        dmg = Math.floor(baseDamage * 0.2);
        // Clash sparks — blue for lightning, yellow for saber
        const spark1 = isLightningAttack ? '#8888ff' : '#ffff44';
        const spark2 = isLightningAttack ? '#4444ff' : '#ffaa00';
        spawnParticles(defender.x + (defender.facing === 1 ? 0 : FIGHTER_W), defender.y + 10, 6, spark1, spark2);
        screenShake = 0.08;
        sfxBlock();
    } else {
        // Hit particles — blue for lightning, orange for saber
        const hitX = defender.x + FIGHTER_W / 2;
        const hitY = defender.y + FIGHTER_H / 3;
        const hit1 = isLightningAttack ? '#aaaaff' : '#ff8844';
        const hit2 = isLightningAttack ? '#4444ff' : '#ff4400';
        spawnParticles(hitX, hitY, 8, hit1, hit2);
        screenShake = 0.15;
        sfxHit();

        defender.state = 'hit';
        defender.stateTimer = HIT_STUN;
    }

    // Knockback
    const dir = attacker.x < defender.x ? 1 : -1;
    defender.x += dir * KNOCKBACK;
    // Clamp to arena
    defender.x = Math.max(10, Math.min(W - FIGHTER_W - 10, defender.x));

    defender.hp = Math.max(0, defender.hp - dmg);
}

function checkAttackHit(attacker, defender) {
    if (attacker.hitDealt) return;
    // Only check during active frames (middle of slash animation)
    const progress = 1 - (attacker.stateTimer / ATTACK_DURATION);
    if (progress < 0.1 || progress > 0.9) return;

    // Attack hitbox extends in facing direction
    const attackX = attacker.facing === 1
        ? attacker.x + FIGHTER_W
        : attacker.x - ATTACK_RANGE;
    const attackW = ATTACK_RANGE;
    const attackY = attacker.y;
    const attackH = FIGHTER_H;

    // Defender hitbox
    const defX = defender.x;
    const defW = FIGHTER_W;
    const defY = defender.y;
    const defH = FIGHTER_H;

    // AABB collision
    if (attackX < defX + defW && attackX + attackW > defX &&
        attackY < defY + defH && attackY + attackH > defY) {
        const diff = getDifficulty();
        const dmg = attacker.isPlayer ? 15 : diff.damage;
        applyDamage(attacker, defender, dmg);
        attacker.hitDealt = true;
    }
}

// ============================================================
// AI
// ============================================================
function updateAI(ai, target, dt) {
    if (ai.state === 'hit' || ai.state === 'ko') return;

    const diff = getDifficulty();
    ai.aiThinkTimer -= dt;
    if (ai.aiThinkTimer > 0) return;

    const dist = Math.abs(ai.x - target.x);
    const inRange = dist < ATTACK_RANGE + FIGHTER_W + 10;

    // Face the player
    ai.facing = ai.x < target.x ? 1 : -1;

    if (inRange) {
        // In attack range
        if (target.state === 'slashing' && Math.random() < diff.blockChance) {
            tryBlock(ai);
            ai.aiThinkTimer = diff.reaction * 0.5;
        } else if (enemyNukeAvailable && !nukeBolt && !nukeActive && target.hp > 30 && Math.random() < 0.02) {
            // AI fires nuke — rare, saves it for when player has decent HP
            stopBlock(ai);
            enemyNukeAvailable = false;
            sfxNukeLaunch();
            const dir = ai.facing;
            nukeBolt = {
                x: ai.x + (dir === 1 ? FIGHTER_W : 0),
                y: ai.y + FIGHTER_H / 2,
                vx: 200 * dir,
                target: target,
            };
            ai.aiThinkTimer = diff.reaction * 3;
        } else if (ai.forceCooldown <= 0 && Math.random() < 0.08) {
            // Occasionally Force Push
            stopBlock(ai);
            tryForcePush(ai, target);
            ai.aiThinkTimer = diff.reaction * 2;
        } else if (Math.random() < diff.attackChance) {
            stopBlock(ai);
            trySlash(ai);
            ai.aiThinkTimer = diff.reaction;
        } else if (Math.random() < 0.3) {
            // Retreat
            ai.vx = -ai.facing * MOVE_SPEED;
            ai.aiThinkTimer = diff.reaction * 0.5;
        } else {
            stopBlock(ai);
            ai.vx = 0;
            ai.aiThinkTimer = diff.reaction * 0.3;
        }
    } else {
        // Approach
        stopBlock(ai);
        ai.vx = ai.facing * MOVE_SPEED;
        // Jump to reach platforms or close vertical distance
        const yDiff = ai.y - target.y;
        if (yDiff > 20 && Math.random() < 0.3) {
            // Target is above us — jump to reach them
            tryJump(ai);
        } else if (Math.random() < 0.12) {
            tryJump(ai);
        }
        ai.aiThinkTimer = diff.reaction * 0.3;
    }
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, count, color1, color2) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 50 + Math.random() * 150;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 50,
            life: 0.3 + Math.random() * 0.3,
            maxLife: 0.3 + Math.random() * 0.3,
            color: Math.random() > 0.5 ? color1 : color2,
            size: 1 + Math.random() * 2,
        });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 200 * dt; // gravity on particles
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
    }
    ctx.globalAlpha = 1;
}

// ============================================================
// UPDATE FIGHTER
// ============================================================
function updateFighter(f, dt) {
    // Timers
    if (f.attackCooldown > 0) f.attackCooldown -= dt;
    if (f.blockCooldown > 0) f.blockCooldown -= dt;
    if (f.forceCooldown > 0) f.forceCooldown -= dt;
    if (f.forceTimer > 0) f.forceTimer -= dt;
    if (f.shootCooldown > 0) f.shootCooldown -= dt;

    // State timers
    if (f.state === 'slashing') {
        f.stateTimer -= dt;
        if (f.stateTimer <= 0) {
            f.state = 'idle';
            f.attackCooldown = ATTACK_COOLDOWN;
        }
    }
    if (f.state === 'hit') {
        f.stateTimer -= dt;
        if (f.stateTimer <= 0) {
            f.state = f.hp <= 0 ? 'ko' : 'idle';
        }
    }
    if (f.state === 'blocking') {
        f.blockTime += dt;
        if (f.blockTime >= BLOCK_MAX) {
            stopBlock(f);
            f.blockCooldown = BLOCK_COOLDOWN;
        }
    }

    // Movement (only when idle or walking)
    if (f.state === 'idle' || f.state === 'walking' || f.state === 'jumping') {
        f.x += f.vx * dt;
    }

    // Gravity + platform collision
    if (!f.grounded) {
        f.vy += GRAVITY * dt;
        const prevY = f.y;
        f.y += f.vy * dt;

        // Check ground
        if (f.y >= GROUND_Y) {
            f.y = GROUND_Y;
            f.vy = 0;
            f.grounded = true;
            f.hasDoubleJumped = false;
            if (f.state === 'jumping') f.state = 'idle';
        }

        // Check platforms (only when falling down)
        if (f.vy > 0) {
            for (const p of PLATFORMS) {
                const fRight = f.x + FIGHTER_W;
                const fLeft = f.x;
                const feetY = f.y + FIGHTER_H;
                const prevFeetY = prevY + FIGHTER_H;
                // Landing: feet cross the platform top, horizontally overlapping
                if (fRight > p.x + 4 && fLeft < p.x + p.w - 4 &&
                    prevFeetY <= p.y && feetY >= p.y) {
                    f.y = p.y - FIGHTER_H;
                    f.vy = 0;
                    f.grounded = true;
                    if (f.state === 'jumping') f.state = 'idle';
                    break;
                }
            }
        }
    } else if (f.y < GROUND_Y) {
        // Check if fighter walked off a platform
        let onPlatform = false;
        for (const p of PLATFORMS) {
            const fRight = f.x + FIGHTER_W;
            const fLeft = f.x;
            const feetY = f.y + FIGHTER_H;
            if (fRight > p.x + 4 && fLeft < p.x + p.w - 4 &&
                Math.abs(feetY - p.y) < 3) {
                onPlatform = true;
                break;
            }
        }
        if (!onPlatform) {
            f.grounded = false;
            // Don't change state — let gravity take over naturally
        }
    }

    // Wall collision — can't walk through, must jump over
    for (const wall of WALLS) {
        const fRight = f.x + FIGHTER_W;
        const fBottom = f.y + FIGHTER_H;
        // Only block if fighter's feet are below the wall top (not jumping over)
        if (fBottom > wall.y + 4 && f.y < wall.y + wall.h) {
            // Coming from the left
            if (fRight > wall.x && f.x < wall.x && fRight < wall.x + wall.w) {
                f.x = wall.x - FIGHTER_W;
            }
            // Coming from the right
            if (f.x < wall.x + wall.w && fRight > wall.x + wall.w && f.x > wall.x) {
                f.x = wall.x + wall.w;
            }
        }
    }

    // Arena bounds
    f.x = Math.max(10, Math.min(W - FIGHTER_W - 10, f.x));

    // Smooth HP display
    const hpSpeed = 80 * dt;
    if (f.displayHp > f.hp) f.displayHp = Math.max(f.hp, f.displayHp - hpSpeed);
    if (f.displayHp < f.hp) f.displayHp = Math.min(f.hp, f.displayHp + hpSpeed);
}

// ============================================================
// PLAYER INPUT
// ============================================================
function handlePlayerInput(p) {
    if (p.state === 'hit' || p.state === 'ko' || p.state === 'slashing') {
        p.vx = 0;
        return;
    }

    // Movement
    p.vx = 0;
    if (p.state !== 'blocking') {
        if (pressedLeft()) p.vx = -MOVE_SPEED;
        if (pressedRight()) p.vx = MOVE_SPEED;
    }

    // Face opponent
    if (enemy) {
        p.facing = p.x < enemy.x ? 1 : -1;
    }

    // Actions
    if (pressedGunToggle()) toggleGun(p);
    if (p.gunDrawn) {
        // Gun mode — shoot instead of slash, can't block with saber
        if (pressedShoot()) tryShoot(p);
        stopBlock(p);
    } else {
        // Saber mode
        if (pressedSlash()) trySlash(p);
        if (pressedBlock()) {
            tryBlock(p);
        } else {
            stopBlock(p);
        }
    }
    if (pressedJump()) tryJump(p);
    if (pressedForce()) tryForcePush(p, enemy);
    if (pressedNuke()) tryNuke(p, enemy);

    // Update walk state
    if (p.state === 'idle' && p.vx !== 0) p.state = 'walking';
    if (p.state === 'walking' && p.vx === 0) p.state = 'idle';
}

// ============================================================
// DRAW FIGHTER
// ============================================================
function drawFighter(f) {
    const sprites = getFighterSprites(f);
    const saberCol = getSaberColor(f);
    let spriteName = 'idle';

    if (f.state === 'slashing') spriteName = 'slash';
    else if (f.state === 'blocking') spriteName = 'block';
    else if (f.state === 'jumping') spriteName = 'jump';
    else if (f.state === 'hit') spriteName = 'hit';
    else if (f.state === 'ko') spriteName = 'ko';

    const sprite = sprites[spriteName];
    const flip = f.facing === -1;

    const useImageSprite = false; // image sprites disabled — using pixel art

    // Draw weapon effects (saber glow or lightning)
    const isDoubleBlade = f.char && f.char.doubleBlade;
    const isLightning = f.char && f.char.lightning;
    const isFourSabers = f.char && f.char.fourSabers;
    const isCrossguard = f.char && f.char.crossguard;

    if (spriteName === 'slash' || spriteName === 'block' || spriteName === 'idle') {
        ctx.save();

        if (isLightning) {
            // === FORCE LIGHTNING ===
            if (spriteName === 'slash') {
                // Draw 3 jagged lightning bolts from hands forward
                const handX = flip ? f.x + 2 : f.x + FIGHTER_W - 2;
                const handY = f.y + 14;
                const dir = flip ? -1 : 1;
                const boltLen = 55;

                for (let b = 0; b < 3; b++) {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#4444ff';
                    ctx.strokeStyle = b === 1 ? '#ffffff' : '#8888ff';
                    ctx.lineWidth = b === 1 ? 2 : 1;
                    ctx.beginPath();
                    let bx = handX;
                    let by = handY + (b - 1) * 4;
                    ctx.moveTo(bx, by);
                    const segments = 6;
                    for (let s = 0; s < segments; s++) {
                        bx += (boltLen / segments) * dir;
                        by += (Math.random() - 0.5) * 8;
                        ctx.lineTo(bx, by);
                    }
                    ctx.stroke();
                }

                // Small sparks at the tip
                ctx.shadowBlur = 4;
                const tipX = handX + boltLen * dir;
                for (let s = 0; s < 4; s++) {
                    ctx.strokeStyle = Math.random() > 0.5 ? '#aaaaff' : '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(tipX, handY);
                    ctx.lineTo(
                        tipX + (Math.random() - 0.5) * 10,
                        handY + (Math.random() - 0.5) * 12
                    );
                    ctx.stroke();
                }
            }
            // Block = just hands up, no visual effect (the Force absorbs it)
            // We draw a subtle force shield shimmer
            if (spriteName === 'block') {
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#4444ff';
                ctx.strokeStyle = 'rgba(100,100,255,0.3)';
                ctx.lineWidth = 2;
                const shieldX = flip ? f.x - 2 : f.x + FIGHTER_W + 2;
                const shieldY = f.y + 5;
                ctx.beginPath();
                ctx.arc(shieldX, shieldY + 10, 15, -Math.PI * 0.6, Math.PI * 0.6);
                ctx.stroke();
            }
        } else {
            // === LIGHTSABER ===
            if (isFourSabers && spriteName === 'slash') {
                // Grievous: 4 sabers fanned out during slash
                const baseX = flip ? f.x - 5 : f.x + FIGHTER_W - 5;
                const baseY = f.y + 8;
                const angles = [-0.3, -0.1, 0.1, 0.3]; // fan spread
                for (let i = 0; i < 4; i++) {
                    const sc = getSaberColor(f, i);
                    const angle = angles[i];
                    const len = 22;
                    const dir = flip ? -1 : 1;
                    const ex = baseX + Math.cos(angle) * len * dir;
                    const ey = baseY + Math.sin(angle) * len;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = sc.glow;
                    ctx.strokeStyle = sc.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(baseX, baseY + angle * 15);
                    ctx.lineTo(ex, ey);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(baseX, baseY + angle * 15);
                    ctx.lineTo(ex, ey);
                    ctx.stroke();
                }
            } else if (isFourSabers && spriteName === 'block') {
                // Grievous: 4 sabers crossed in X guard
                const cx = flip ? f.x + 8 : f.x + FIGHTER_W - 12;
                const cy = f.y - 2;
                const positions = [[-8,-12,8,12],[-8,12,8,-12],[-4,-14,4,10],[-4,14,4,-10]];
                for (let i = 0; i < 4; i++) {
                    const sc = getSaberColor(f, i);
                    const p = positions[i];
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = sc.glow;
                    ctx.strokeStyle = sc.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(cx + p[0], cy + p[1]);
                    ctx.lineTo(cx + p[2], cy + p[3]);
                    ctx.stroke();
                }
            } else if (isFourSabers && spriteName === 'idle') {
                // Grievous: 4 sabers held at sides
                const baseX = flip ? f.x + 8 : f.x + FIGHTER_W - 8;
                const baseY = f.y + 14;
                const offsets = [[-10,18],[-6,20],[6,20],[10,18]];
                for (let i = 0; i < 4; i++) {
                    const sc = getSaberColor(f, i);
                    const dir = flip ? -1 : 1;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = sc.glow;
                    ctx.strokeStyle = sc.color;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(baseX, baseY);
                    ctx.lineTo(baseX + offsets[i][0] * dir, baseY + offsets[i][1]);
                    ctx.stroke();
                }
            } else {
                // Normal saber (1 blade)
                ctx.shadowBlur = 12;
                ctx.shadowColor = saberCol.glow;

                if (spriteName === 'slash') {
                    const sx = flip ? f.x - 20 : f.x + FIGHTER_W - 5;
                    const sy = f.y + 14;
                    ctx.strokeStyle = saberCol.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx + (flip ? -35 : 35), sy);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx + (flip ? -35 : 35), sy);
                    ctx.stroke();

                    // Double blade
                    if (isDoubleBlade) {
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = saberCol.glow;
                        ctx.strokeStyle = saberCol.color;
                        ctx.globalAlpha = 0.5;
                        ctx.lineWidth = 2;
                        const bx = flip ? f.x + FIGHTER_W + 5 : f.x - 5;
                        ctx.beginPath();
                        ctx.moveTo(bx, sy);
                        ctx.lineTo(bx + (flip ? 18 : -18), sy);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }

                    // Kylo crossguard — small side vents
                    if (isCrossguard) {
                        const hiltX = flip ? f.x + FIGHTER_W - 8 : f.x + FIGHTER_W - 8;
                        const hiltX2 = flip ? f.x + 2 : f.x + FIGHTER_W - 2;
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = saberCol.glow;
                        ctx.strokeStyle = saberCol.color;
                        ctx.lineWidth = 2;
                        // Top vent
                        ctx.beginPath();
                        ctx.moveTo(hiltX2, sy);
                        ctx.lineTo(hiltX2, sy - 8);
                        ctx.stroke();
                        // Bottom vent
                        ctx.beginPath();
                        ctx.moveTo(hiltX2, sy);
                        ctx.lineTo(hiltX2, sy + 8);
                        ctx.stroke();
                    }
                } else if (spriteName === 'block') {
                    const sx = flip ? f.x + 8 : f.x + FIGHTER_W - 12;
                    const sy = f.y - 14;
                    ctx.strokeStyle = saberCol.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx, sy + 32);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(sx, sy + 32);
                    ctx.stroke();

                    // Double blade
                    if (isDoubleBlade) {
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = saberCol.glow;
                        ctx.strokeStyle = saberCol.color;
                        ctx.globalAlpha = 0.5;
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(sx, sy + 30);
                        ctx.lineTo(sx, sy + 48);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }

                    // Kylo crossguard
                    if (isCrossguard) {
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = saberCol.glow;
                        ctx.strokeStyle = saberCol.color;
                        ctx.lineWidth = 2;
                        const hy = sy + 20;
                        ctx.beginPath();
                        ctx.moveTo(sx, hy);
                        ctx.lineTo(sx - 6, hy);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(sx, hy);
                        ctx.lineTo(sx + 6, hy);
                        ctx.stroke();
                    }
                } else if (spriteName === 'idle') {
                    // Idle saber — held upward from the hand in a ready stance
                    // Hand is at the P pixel in the sprite (column ~6, row ~4)
                    const handOffsetX = flip ? -4 : FIGHTER_W - 4;
                    const handOffsetY = 16;
                    const hx = f.x + handOffsetX;
                    const hy = f.y + handOffsetY;
                    // Blade angles upward and slightly forward
                    const bladeLen = 28;
                    const tipX = hx + (flip ? -10 : 10);
                    const tipY = hy - bladeLen;

                    // Hilt (small, at hand)
                    const hiltAngle = Math.atan2(tipY - hy, tipX - hx);
                    ctx.save();
                    ctx.translate(hx, hy);
                    ctx.rotate(hiltAngle);
                    ctx.fillStyle = '#888888';
                    ctx.fillRect(-6, -2, 8, 4);
                    ctx.fillStyle = '#666666';
                    ctx.fillRect(-5, -2.5, 2, 5);
                    ctx.fillRect(-1, -2.5, 2, 5);
                    ctx.restore();

                    // Blade glow
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = saberCol.glow;
                    ctx.strokeStyle = saberCol.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(hx, hy);
                    ctx.lineTo(tipX, tipY);
                    ctx.stroke();
                    // White core
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(hx, hy);
                    ctx.lineTo(tipX, tipY);
                    ctx.stroke();
                }
            }
        }
        ctx.restore();
    }

    // Draw sprite with animation offsets
    let bobY = 0;
    if (f.state === 'idle' && f.grounded) {
        bobY = Math.sin(gameTime * 2.5 + (f.isPlayer ? 0 : Math.PI)) > 0.3 ? -1 : 0;
    } else if (f.state === 'walking') {
        bobY = Math.sin(gameTime * 10) > 0 ? -1 : 1;
    }

    if (useImageSprite) {
        const img = VADER_IMAGES[spriteName];
        const imgW = 64;
        const imgH = 80;
        const drawX = f.x + FIGHTER_W / 2;
        const drawY = f.y + FIGHTER_H + bobY;
        ctx.save();
        ctx.translate(drawX, drawY);
        // Sprite source faces right — flip when facing left
        if (!flip) ctx.scale(-1, 1);
        ctx.drawImage(img, -imgW / 2, -imgH, imgW, imgH);
        ctx.restore();
    } else {
        const spriteX = f.x - (sprite.w * SPRITE_SCALE - FIGHTER_W) / 2;
        const spriteY = f.y + FIGHTER_H - sprite.h * SPRITE_SCALE + bobY;
        const origSaber = f.char ? f.char.colors.S : null;
        drawSprite(sprite, Math.floor(spriteX), Math.floor(spriteY), SPRITE_SCALE, flip, saberCol.color, origSaber);
    }

    // Blaster gun when drawn
    if (f.gunDrawn && f.state !== 'ko') {
        const gx = flip ? f.x + 2 : f.x + FIGHTER_W - 6;
        const gy = f.y + FIGHTER_H / 2 - 4;
        const dir = flip ? -1 : 1;
        // Gun body
        ctx.fillStyle = '#666666';
        ctx.fillRect(gx, gy, 4, 4);
        // Barrel
        ctx.fillStyle = '#888888';
        ctx.fillRect(gx + (flip ? -6 : 4), gy + 1, 6, 2);
        // Muzzle tip
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(gx + (flip ? -7 : 9), gy + 1, 1, 2);
    }

    // Force Push wave effect
    if (f.forceTimer > 0) {
        const progress = 1 - (f.forceTimer / FORCE_DURATION);
        const waveR = 10 + progress * 40;
        const dir = f.facing;
        const waveX = f.x + (dir === 1 ? FIGHTER_W + 5 + progress * 30 : -5 - progress * 30);
        const waveY = f.y + FIGHTER_H / 2;
        ctx.save();
        ctx.globalAlpha = 0.6 * (1 - progress);
        ctx.strokeStyle = '#88bbff';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#4488ff';
        // Draw expanding arc in the push direction
        const startAngle = dir === 1 ? -Math.PI / 2 : Math.PI / 2;
        const endAngle = dir === 1 ? Math.PI / 2 : -Math.PI / 2;
        ctx.beginPath();
        ctx.arc(waveX, waveY, waveR, startAngle, endAngle);
        ctx.stroke();
        // Inner brighter arc
        ctx.strokeStyle = '#bbddff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(waveX, waveY, waveR * 0.6, startAngle, endAngle);
        ctx.stroke();
        ctx.restore();
    }

    // Force cooldown indicator (small bar under character)
    if (f.isPlayer && f.forceCooldown > 0) {
        const barW = FIGHTER_W;
        const barH = 2;
        const barX = f.x;
        const barY = f.y + FIGHTER_H + 4;
        const ratio = 1 - (f.forceCooldown / FORCE_COOLDOWN);
        ctx.fillStyle = '#333';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = '#6688cc';
        ctx.fillRect(barX, barY, barW * ratio, barH);
    }
}

function drawHealthBar(x, y, w, h, hp, maxHp, displayHp, label, align) {
    // Background
    ctx.fillStyle = COLORS.hpBg;
    ctx.fillRect(x, y, w, h);

    // Display HP bar (delayed drain)
    const displayRatio = displayHp / maxHp;
    const displayW = Math.floor(w * displayRatio);
    ctx.fillStyle = '#882222';
    if (align === 'right') {
        ctx.fillRect(x + w - displayW, y, displayW, h);
    } else {
        ctx.fillRect(x, y, displayW, h);
    }

    // Current HP bar
    const ratio = hp / maxHp;
    const barW = Math.floor(w * ratio);
    const color = ratio > 0.6 ? COLORS.hpGreen : ratio > 0.3 ? COLORS.hpYellow : COLORS.hpRed;
    ctx.fillStyle = color;
    if (align === 'right') {
        ctx.fillRect(x + w - barW, y, barW, h);
    } else {
        ctx.fillRect(x, y, barW, h);
    }

    // Border
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = align === 'right' ? 'right' : 'left';
    const labelX = align === 'right' ? x + w - 4 : x + 4;
    ctx.fillText(label, labelX, y - 3);
}

function drawHUD() {
    const barW = 160;
    const barH = 10;
    const barY = 18;
    const margin = 20;

    // Player HP (left)
    const pLabel = player.char ? player.char.shortName : (player.side === 'light' ? 'LIGHT' : 'DARK');
    drawHealthBar(margin, barY, barW, barH, player.hp, player.maxHp, player.displayHp, pLabel, 'left');

    // Enemy HP (right)
    const eLabel = enemy.char ? enemy.char.shortName : (enemy.side === 'light' ? 'LIGHT' : 'DARK');
    drawHealthBar(W - margin - barW, barY, barW, barH, enemy.hp, enemy.maxHp, enemy.displayHp, eLabel, 'right');

    // Level indicator
    const diff = getDifficulty();
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    const layout = LEVEL_LAYOUTS[Math.min(currentLevel - 1, LEVEL_LAYOUTS.length - 1)];
    ctx.fillText(`LEVEL ${currentLevel}: ${layout.name}`, W / 2, barY + barH / 2 + 3);

    // Nuke indicator
    if (nukeAvailable) {
        ctx.save();
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#4488ff';
        ctx.fillStyle = '#4488ff';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('[H] NUKE READY', margin, barY + barH + 14);
        ctx.restore();
    } else if (!nukeActive) {
        ctx.fillStyle = '#333';
        ctx.font = '8px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('[H] NUKE USED', margin, barY + barH + 14);
    }
}

const stars = [];
for (let i = 0; i < 80; i++) {
    stars.push({
        x: Math.random() * W,
        y: Math.random() * (H - 60),
        size: Math.random() > 0.8 ? 2 : 1,
        brightness: 0.3 + Math.random() * 0.7,
    });
}

// TIE Fighter squads
const tieSquads = [];
let tieSpawnTimer = 0;

function spawnTieSquad() {
    const fromLeft = Math.random() > 0.5;
    const baseY = 30 + Math.random() * (GROUND_Y - 60);
    const speed = 80 + Math.random() * 60;
    const dir = fromLeft ? 1 : -1;
    const startX = fromLeft ? -40 : W + 40;
    // 3 TIE fighters in a V formation
    tieSquads.push(
        { x: startX, y: baseY, vx: speed * dir },
        { x: startX - 18 * dir, y: baseY - 10, vx: speed * dir },
        { x: startX - 18 * dir, y: baseY + 10, vx: speed * dir },
    );
}

function updateTies(dt) {
    tieSpawnTimer -= dt;
    if (tieSpawnTimer <= 0) {
        spawnTieSquad();
        tieSpawnTimer = 4 + Math.random() * 6; // every 4-10 seconds
    }
    for (let i = tieSquads.length - 1; i >= 0; i--) {
        tieSquads[i].x += tieSquads[i].vx * dt;
        if (tieSquads[i].x < -60 || tieSquads[i].x > W + 60) {
            tieSquads.splice(i, 1);
        }
    }
}

function drawTie(x, y, flip) {
    // Tiny pixel art TIE fighter (~7x7 pixels, drawn at 1:1)
    const s = 1; // pixel scale
    const fx = Math.floor(x);
    const fy = Math.floor(y);

    // Wings (vertical hexagonal panels)
    ctx.fillStyle = '#667';
    ctx.fillRect(fx - 3 * s, fy - 3 * s, s, 7 * s); // left wing
    ctx.fillRect(fx + 3 * s, fy - 3 * s, s, 7 * s); // right wing

    // Wing struts
    ctx.fillStyle = '#556';
    ctx.fillRect(fx - 2 * s, fy - 2 * s, s, 5 * s);
    ctx.fillRect(fx + 2 * s, fy - 2 * s, s, 5 * s);

    // Cockpit (center ball)
    ctx.fillStyle = '#888';
    ctx.fillRect(fx - s, fy - s, 3 * s, 3 * s);
    // Window
    ctx.fillStyle = '#446';
    ctx.fillRect(fx, fy, s, s);

    // Strut connections
    ctx.fillStyle = '#778';
    ctx.fillRect(fx - 2 * s, fy, s, s);
    ctx.fillRect(fx + 2 * s, fy, s, s);
}

function getCurrentBg() {
    if (gameState === 'fighting' || gameState === 'countdown' || gameState === 'versus' ||
        gameState === 'win' || gameState === 'lose') {
        const layout = LEVEL_LAYOUTS[Math.min(currentLevel - 1, LEVEL_LAYOUTS.length - 1)];
        return layout.bg;
    }
    return 'deathstar';
}

function drawStarsAndSky(skyColor) {
    ctx.fillStyle = skyColor || COLORS.sky;
    ctx.fillRect(0, 0, W, H);
    for (const s of stars) {
        ctx.globalAlpha = s.brightness;
        ctx.fillStyle = COLORS.star;
        ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;
}

function drawDeathStar() {
    const dsX = W - 80;
    const dsY = 50;
    const dsR = 55;

    // Main body — slight gradient effect (lighter top-left)
    ctx.fillStyle = '#555555';
    ctx.beginPath();
    ctx.arc(dsX, dsY, dsR, 0, Math.PI * 2);
    ctx.fill();

    // Clip all surface detail to the sphere
    ctx.save();
    ctx.beginPath();
    ctx.arc(dsX, dsY, dsR - 1, 0, Math.PI * 2);
    ctx.clip();

    // Latitude lines — straight horizontal bands that span the sphere
    // These are the horizontal "trenches" that ring the Death Star
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 1;
    for (let i = -4; i <= 4; i++) {
        if (i === 0) continue;
        const ly = dsY + i * 11;
        const dx = Math.sqrt(Math.max(0, dsR * dsR - (ly - dsY) * (ly - dsY)));
        if (dx > 2) {
            ctx.beginPath();
            ctx.moveTo(dsX - dx, ly);
            ctx.lineTo(dsX + dx, ly);
            ctx.stroke();
        }
    }

    // Equator trench — the big horizontal band
    ctx.strokeStyle = '#383838';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(dsX - dsR, dsY);
    ctx.lineTo(dsX + dsR, dsY);
    ctx.stroke();

    // Longitude lines — these CURVE like a globe
    // Use arcs: at the center they're straight (very large radius arc),
    // toward the edges they curve more tightly
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 1;
    const longCount = 7; // longitude lines
    for (let i = 0; i < longCount; i++) {
        // Position on sphere surface: -1 to 1 across the visible face
        const t = (i + 1) / (longCount + 1) * 2 - 1; // -1 to 1
        // X offset on sphere
        const surfaceX = t * dsR * 0.85;
        // How much this line curves: at center (t=0) it's nearly straight,
        // at edges it curves sharply
        const curvature = t; // negative = curves left, positive = curves right
        // Draw the curved line using a quadratic bezier
        const topY = dsY - Math.sqrt(Math.max(0, dsR * dsR - surfaceX * surfaceX));
        const botY = dsY + Math.sqrt(Math.max(0, dsR * dsR - surfaceX * surfaceX));
        // Control point: offset horizontally by curvature factor
        const cpX = dsX + surfaceX + curvature * dsR * 0.4;
        ctx.beginPath();
        ctx.moveTo(dsX + surfaceX, topY + 2);
        ctx.quadraticCurveTo(cpX, dsY, dsX + surfaceX, botY - 2);
        ctx.stroke();
    }

    ctx.restore(); // remove clip

    // Superlaser dish — positioned in upper-left quadrant of the sphere
    const dishX = dsX - dsR * 0.28;
    const dishY = dsY - dsR * 0.32;
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.arc(dishX, dishY, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.arc(dishX, dishY, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4a6a4a';
    ctx.beginPath();
    ctx.arc(dishX, dishY, 3, 0, Math.PI * 2);
    ctx.fill();

    // Edge highlight
    ctx.strokeStyle = '#666666';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(dsX, dsY, dsR, 0, Math.PI * 2);
    ctx.stroke();

}

function drawMetalFloor(floorColor, gridColor, edgeColor) {
    const floorY = GROUND_Y + FIGHTER_H;
    ctx.fillStyle = floorColor || '#252530';
    ctx.fillRect(0, floorY, W, H - floorY);
    ctx.strokeStyle = gridColor || '#35353f';
    ctx.lineWidth = 1;
    for (let x = 0; x <= W; x += 24) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, floorY + 2);
        ctx.lineTo(x + 0.5, H);
        ctx.stroke();
    }
    for (let y = floorY + 2; y <= H; y += 12) {
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(W, y + 0.5);
        ctx.stroke();
    }
    ctx.fillStyle = edgeColor || '#444450';
    ctx.fillRect(0, floorY, W, 2);
}

function drawPlatformsAndWalls(platColor, platHighlight, wallColor, wallHighlight) {
    // Platforms
    for (const p of PLATFORMS) {
        ctx.fillStyle = platColor || '#3a3a44';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = platHighlight || '#505060';
        ctx.fillRect(p.x, p.y, p.w, 2);
        ctx.fillStyle = '#252530';
        ctx.fillRect(p.x, p.y + p.h - 1, p.w, 1);
        ctx.strokeStyle = '#4a4a55';
        ctx.lineWidth = 1;
        for (let x = p.x + 12; x < p.x + p.w; x += 12) {
            ctx.beginPath();
            ctx.moveTo(x + 0.5, p.y + 2);
            ctx.lineTo(x + 0.5, p.y + p.h - 1);
            ctx.stroke();
        }
    }
    // Walls
    for (const w of WALLS) {
        ctx.fillStyle = wallColor || '#3a3a44';
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.fillStyle = wallHighlight || '#505060';
        ctx.fillRect(w.x, w.y, w.w, 2);
        ctx.fillStyle = '#2a2a30';
        ctx.fillRect(w.x + w.w - 1, w.y, 1, w.h);
        // Panel lines
        ctx.strokeStyle = '#4a4a55';
        ctx.lineWidth = 1;
        for (let y = w.y + 10; y < w.y + w.h; y += 10) {
            ctx.beginPath();
            ctx.moveTo(w.x + 1, y + 0.5);
            ctx.lineTo(w.x + w.w - 1, y + 0.5);
            ctx.stroke();
        }
    }
}

function drawBackground() {
    const bg = getCurrentBg();

    if (bg === 'cloudcity') {
        // Cloud City — orange/amber sunset sky
        ctx.fillStyle = '#1a1020';
        ctx.fillRect(0, 0, W, H);
        // Gradient sky — dark purple to orange at horizon
        for (let y = 0; y < GROUND_Y; y += 2) {
            const t = y / GROUND_Y;
            const r = Math.floor(20 + t * 80);
            const g = Math.floor(10 + t * 40);
            const b = Math.floor(30 - t * 10);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, y, W, 2);
        }
        // Stars (dimmer)
        for (const s of stars) {
            if (s.y < 60) {
                ctx.globalAlpha = s.brightness * 0.4;
                ctx.fillStyle = COLORS.star;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
        }
        ctx.globalAlpha = 1;
        // Clouds
        for (let i = 0; i < 5; i++) {
            const cx = 40 + i * 100 + Math.sin(gameTime * 0.2 + i) * 5;
            const cy = GROUND_Y - 30 + i * 8;
            ctx.fillStyle = 'rgba(180,120,60,0.15)';
            ctx.beginPath();
            ctx.ellipse(cx, cy, 50 + i * 10, 8, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        // City buildings in distance
        ctx.fillStyle = '#2a1a2a';
        for (let i = 0; i < 8; i++) {
            const bx = 20 + i * 60;
            const bh = 15 + (i % 3) * 10;
            ctx.fillRect(bx, GROUND_Y + FIGHTER_H - bh - 2, 30, bh);
            // Windows
            ctx.fillStyle = '#ffaa44';
            for (let wy = GROUND_Y + FIGHTER_H - bh + 3; wy < GROUND_Y + FIGHTER_H - 4; wy += 6) {
                ctx.fillRect(bx + 4, wy, 2, 2);
                ctx.fillRect(bx + 12, wy, 2, 2);
                ctx.fillRect(bx + 20, wy, 2, 2);
            }
            ctx.fillStyle = '#2a1a2a';
        }
        // Floor — polished white/gray corridor
        drawMetalFloor('#303040', '#404050', '#555565');
        drawPlatformsAndWalls('#404055', '#606070', '#505060', '#707080');

    } else if (bg === 'mustafar') {
        // Mustafar — lava planet, dark red/black sky
        ctx.fillStyle = '#0a0000';
        ctx.fillRect(0, 0, W, H);
        // Red glow from below
        for (let y = GROUND_Y - 40; y < GROUND_Y + FIGHTER_H; y += 2) {
            const t = (y - (GROUND_Y - 40)) / (FIGHTER_H + 40);
            ctx.fillStyle = `rgba(180,40,0,${t * 0.15})`;
            ctx.fillRect(0, y, W, 2);
        }
        // Dim stars
        for (const s of stars) {
            if (s.y < 80) {
                ctx.globalAlpha = s.brightness * 0.3;
                ctx.fillStyle = '#ff8866';
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
        }
        ctx.globalAlpha = 1;
        // Lava rivers in the floor
        const floorY = GROUND_Y + FIGHTER_H;
        ctx.fillStyle = '#1a0a0a';
        ctx.fillRect(0, floorY, W, H - floorY);
        // Lava cracks
        for (let i = 0; i < 6; i++) {
            const lx = 30 + i * 80;
            const ly = floorY + 4 + (i % 3) * 8;
            const lw = 20 + (i % 4) * 10;
            ctx.fillStyle = '#cc4400';
            ctx.fillRect(lx, ly, lw, 2);
            ctx.fillStyle = '#ff8800';
            ctx.fillRect(lx + 2, ly, lw - 4, 1);
            // Glow
            ctx.fillStyle = 'rgba(255,100,0,0.1)';
            ctx.fillRect(lx - 3, ly - 3, lw + 6, 8);
        }
        ctx.fillStyle = '#553020';
        ctx.fillRect(0, floorY, W, 2);
        // Volcanic rock platforms
        drawPlatformsAndWalls('#3a2a1a', '#5a4a3a', '#4a3020', '#6a5040');

    } else if (bg === 'endor') {
        // Endor — forest moon, dark green/brown
        ctx.fillStyle = '#050a05';
        ctx.fillRect(0, 0, W, H);
        // Stars through canopy
        for (const s of stars) {
            if (Math.random() > 0.5) {
                ctx.globalAlpha = s.brightness * 0.5;
                ctx.fillStyle = COLORS.star;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
        }
        ctx.globalAlpha = 1;
        // Tree trunks in background
        ctx.fillStyle = '#2a1a0a';
        for (let i = 0; i < 6; i++) {
            const tx = 30 + i * 85;
            const tw = 8 + (i % 3) * 4;
            ctx.fillRect(tx, 20, tw, GROUND_Y + FIGHTER_H - 20);
            // Canopy
            ctx.fillStyle = '#1a3a0a';
            ctx.beginPath();
            ctx.ellipse(tx + tw / 2, 30 + i * 5, 25 + i * 3, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#2a1a0a';
        }
        // Forest floor
        const floorY = GROUND_Y + FIGHTER_H;
        ctx.fillStyle = '#1a1a0a';
        ctx.fillRect(0, floorY, W, H - floorY);
        // Grass tufts
        ctx.fillStyle = '#2a4a1a';
        for (let x = 0; x < W; x += 8) {
            const gh = 2 + Math.floor(Math.random() * 3);
            ctx.fillRect(x, floorY - gh + 2, 3, gh);
        }
        ctx.fillStyle = '#3a3a1a';
        ctx.fillRect(0, floorY, W, 2);
        // Wooden platforms + log walls
        drawPlatformsAndWalls('#4a3a1a', '#6a5a3a', '#3a2a0a', '#5a4a2a');

    } else if (bg === 'hoth') {
        // Hoth — white/blue ice planet
        ctx.fillStyle = '#0a1020';
        ctx.fillRect(0, 0, W, H);
        // Blue-white gradient sky
        for (let y = 0; y < GROUND_Y; y += 2) {
            const t = y / GROUND_Y;
            const r = Math.floor(10 + t * 50);
            const g = Math.floor(15 + t * 60);
            const b = Math.floor(30 + t * 70);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, y, W, 2);
        }
        // Snow stars
        for (const s of stars) {
            ctx.globalAlpha = s.brightness * 0.6;
            ctx.fillStyle = '#ddeeff';
            ctx.fillRect(s.x, s.y, s.size, s.size);
        }
        ctx.globalAlpha = 1;
        // Snow mountains in background
        ctx.fillStyle = '#667788';
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y + 56);
        ctx.lineTo(60, GROUND_Y - 20);
        ctx.lineTo(120, GROUND_Y + 10);
        ctx.lineTo(180, GROUND_Y - 30);
        ctx.lineTo(250, GROUND_Y + 5);
        ctx.lineTo(320, GROUND_Y - 15);
        ctx.lineTo(400, GROUND_Y + 15);
        ctx.lineTo(W, GROUND_Y - 10);
        ctx.lineTo(W, GROUND_Y + 56);
        ctx.fill();
        // Snow caps
        ctx.fillStyle = '#aabbcc';
        ctx.beginPath();
        ctx.moveTo(50, GROUND_Y - 15);
        ctx.lineTo(60, GROUND_Y - 20);
        ctx.lineTo(70, GROUND_Y - 15);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(170, GROUND_Y - 25);
        ctx.lineTo(180, GROUND_Y - 30);
        ctx.lineTo(190, GROUND_Y - 25);
        ctx.fill();
        // Ice floor
        const floorY = GROUND_Y + 56;
        ctx.fillStyle = '#c0d0e0';
        ctx.fillRect(0, floorY, W, H - floorY);
        ctx.fillStyle = '#d0e0f0';
        ctx.fillRect(0, floorY, W, 2);
        // Ice cracks
        ctx.strokeStyle = '#a0b8cc';
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
            const cx = 40 + i * 100;
            ctx.beginPath();
            ctx.moveTo(cx, floorY + 3);
            ctx.lineTo(cx + 15, floorY + 10);
            ctx.lineTo(cx + 5, floorY + 18);
            ctx.stroke();
        }
        drawPlatformsAndWalls('#8898a8', '#a0b0c0');

    } else if (bg === 'naboo') {
        // Naboo — elegant marble throne room, warm golden light
        ctx.fillStyle = '#1a1410';
        ctx.fillRect(0, 0, W, H);
        // Warm interior glow
        for (let y = 0; y < GROUND_Y + 56; y += 2) {
            const t = y / (GROUND_Y + 56);
            ctx.fillStyle = `rgba(60,40,20,${0.02 + t * 0.04})`;
            ctx.fillRect(0, y, W, 2);
        }
        // Tall marble columns
        for (let i = 0; i < 5; i++) {
            const cx = 50 + i * 105;
            // Column
            ctx.fillStyle = '#554a3a';
            ctx.fillRect(cx, 20, 12, GROUND_Y + 36);
            // Column highlight
            ctx.fillStyle = '#6a5a4a';
            ctx.fillRect(cx + 2, 20, 3, GROUND_Y + 36);
            // Capital (top)
            ctx.fillStyle = '#6a5a48';
            ctx.fillRect(cx - 4, 18, 20, 6);
            // Base
            ctx.fillStyle = '#6a5a48';
            ctx.fillRect(cx - 3, GROUND_Y + 50, 18, 6);
        }
        // Arched windows with golden light
        for (let i = 0; i < 3; i++) {
            const wx = 100 + i * 140;
            ctx.fillStyle = '#443820';
            ctx.fillRect(wx, 30, 30, 50);
            // Window glow
            ctx.fillStyle = '#aa8844';
            ctx.fillRect(wx + 3, 33, 24, 44);
            ctx.fillStyle = '#ccaa55';
            ctx.fillRect(wx + 6, 36, 18, 38);
        }
        // Marble floor
        const floorY = GROUND_Y + 56;
        ctx.fillStyle = '#3a3028';
        ctx.fillRect(0, floorY, W, H - floorY);
        // Floor tiles
        ctx.strokeStyle = '#4a4038';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 30) {
            ctx.beginPath();
            ctx.moveTo(x + 0.5, floorY);
            ctx.lineTo(x + 0.5, H);
            ctx.stroke();
        }
        ctx.fillStyle = '#4a4038';
        ctx.fillRect(0, floorY, W, 2);
        drawPlatformsAndWalls('#5a4a38', '#7a6a58');

    } else if (bg === 'coruscant') {
        // Coruscant — Jedi Temple at night, city lights below
        ctx.fillStyle = '#06060f';
        ctx.fillRect(0, 0, W, H);
        // Stars
        for (const s of stars) {
            ctx.globalAlpha = s.brightness * 0.7;
            ctx.fillStyle = COLORS.star;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        }
        ctx.globalAlpha = 1;
        // City skyline silhouette
        ctx.fillStyle = '#0a0a1a';
        for (let i = 0; i < 15; i++) {
            const bx = i * 34;
            const bh = 20 + (i * 7 + 13) % 30;
            ctx.fillRect(bx, GROUND_Y + 56 - bh, 30, bh);
        }
        // City lights (tiny dots on buildings)
        for (let i = 0; i < 40; i++) {
            const lx = 5 + Math.floor(i * 12.3) % W;
            const ly = GROUND_Y + 30 + (i * 7) % 25;
            const colors = ['#ffcc44', '#44aaff', '#ff6644', '#ffffff'];
            ctx.fillStyle = colors[i % colors.length];
            ctx.globalAlpha = 0.4 + Math.sin(gameTime * 2 + i) * 0.2;
            ctx.fillRect(lx, ly, 1, 1);
        }
        ctx.globalAlpha = 1;
        // Jedi Temple spire silhouette (center background)
        ctx.fillStyle = '#12122a';
        ctx.beginPath();
        ctx.moveTo(W / 2 - 40, GROUND_Y + 56);
        ctx.lineTo(W / 2 - 30, GROUND_Y - 10);
        ctx.lineTo(W / 2 - 10, GROUND_Y - 30);
        ctx.lineTo(W / 2, GROUND_Y - 50);
        ctx.lineTo(W / 2 + 10, GROUND_Y - 30);
        ctx.lineTo(W / 2 + 30, GROUND_Y - 10);
        ctx.lineTo(W / 2 + 40, GROUND_Y + 56);
        ctx.fill();
        // Temple floor — polished dark stone
        const floorY = GROUND_Y + 56;
        ctx.fillStyle = '#151520';
        ctx.fillRect(0, floorY, W, H - floorY);
        ctx.strokeStyle = '#20202f';
        ctx.lineWidth = 1;
        for (let x = 0; x < W; x += 20) {
            ctx.beginPath();
            ctx.moveTo(x + 0.5, floorY + 2);
            ctx.lineTo(x + 0.5, H);
            ctx.stroke();
        }
        ctx.fillStyle = '#252535';
        ctx.fillRect(0, floorY, W, 2);
        drawPlatformsAndWalls('#252535', '#353545');

    } else if (bg === 'dagobah') {
        // Dagobah — murky green swamp, fog, twisted trees
        ctx.fillStyle = '#0a0f0a';
        ctx.fillRect(0, 0, W, H);
        // Foggy green gradient
        for (let y = 0; y < GROUND_Y + 56; y += 2) {
            const t = y / (GROUND_Y + 56);
            ctx.fillStyle = `rgba(20,40,15,${0.02 + t * 0.06})`;
            ctx.fillRect(0, y, W, 2);
        }
        // Twisted dead trees
        ctx.strokeStyle = '#2a3a1a';
        ctx.lineWidth = 3;
        for (let i = 0; i < 4; i++) {
            const tx = 60 + i * 120;
            // Trunk
            ctx.beginPath();
            ctx.moveTo(tx, GROUND_Y + 56);
            ctx.lineTo(tx + 5, GROUND_Y - 10);
            ctx.stroke();
            // Branches
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(tx + 3, GROUND_Y + 10);
            ctx.lineTo(tx - 15, GROUND_Y - 20);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tx + 4, GROUND_Y - 5);
            ctx.lineTo(tx + 20, GROUND_Y - 30);
            ctx.stroke();
            ctx.lineWidth = 3;
        }
        // Hanging vines
        ctx.strokeStyle = '#1a3a0a';
        ctx.lineWidth = 1;
        for (let i = 0; i < 8; i++) {
            const vx = 30 + i * 60;
            const vy = 20 + (i % 3) * 15;
            ctx.beginPath();
            ctx.moveTo(vx, vy);
            ctx.quadraticCurveTo(vx + 3, vy + 20, vx - 2, vy + 35);
            ctx.stroke();
        }
        // Fog patches
        for (let i = 0; i < 4; i++) {
            const fx = 20 + i * 130 + Math.sin(gameTime * 0.3 + i) * 10;
            const fy = GROUND_Y + 20;
            ctx.fillStyle = 'rgba(40,60,30,0.12)';
            ctx.beginPath();
            ctx.ellipse(fx, fy, 60, 12, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        // Swamp floor — dark murky green-brown
        const floorY = GROUND_Y + 56;
        ctx.fillStyle = '#1a2010';
        ctx.fillRect(0, floorY, W, H - floorY);
        // Murky water patches
        ctx.fillStyle = '#152a10';
        for (let x = 0; x < W; x += 40) {
            ctx.fillRect(x + 5, floorY + 3, 25, 4);
        }
        ctx.fillStyle = '#2a3a1a';
        ctx.fillRect(0, floorY, W, 2);
        drawPlatformsAndWalls('#3a4a2a', '#5a6a4a');

    } else if (bg === 'scarif') {
        // Scarif — tropical beach, palm trees, blue sky, ocean
        // Sky gradient — blue
        for (let y = 0; y < GROUND_Y; y += 2) {
            const t = y / GROUND_Y;
            const r = Math.floor(30 + t * 60);
            const g = Math.floor(80 + t * 80);
            const b = Math.floor(160 - t * 40);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, y, W, 2);
        }
        // Ocean in mid-background
        ctx.fillStyle = '#2266aa';
        ctx.fillRect(0, GROUND_Y - 10, W, 30);
        ctx.fillStyle = '#3377bb';
        // Wave highlights
        for (let x = 0; x < W; x += 20) {
            const wy = GROUND_Y - 8 + Math.sin(gameTime * 2 + x * 0.1) * 2;
            ctx.fillRect(x, wy, 12, 1);
        }
        // Palm trees
        for (let i = 0; i < 3; i++) {
            const px = 80 + i * 170;
            // Trunk
            ctx.strokeStyle = '#5a4020';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(px, GROUND_Y + 56);
            ctx.quadraticCurveTo(px + 8, GROUND_Y, px + 5, GROUND_Y - 30);
            ctx.stroke();
            // Fronds
            ctx.strokeStyle = '#2a6a1a';
            ctx.lineWidth = 2;
            for (let f = 0; f < 5; f++) {
                const angle = -Math.PI / 2 + (f - 2) * 0.5;
                ctx.beginPath();
                ctx.moveTo(px + 5, GROUND_Y - 30);
                ctx.quadraticCurveTo(
                    px + 5 + Math.cos(angle) * 20,
                    GROUND_Y - 30 + Math.sin(angle) * 15,
                    px + 5 + Math.cos(angle) * 30,
                    GROUND_Y - 25 + Math.sin(angle) * 20
                );
                ctx.stroke();
            }
        }
        // Sandy floor
        const floorY = GROUND_Y + 56;
        ctx.fillStyle = '#c4a860';
        ctx.fillRect(0, floorY, W, H - floorY);
        ctx.fillStyle = '#d4b870';
        ctx.fillRect(0, floorY, W, 2);
        // Sand texture
        ctx.fillStyle = '#b89850';
        for (let i = 0; i < 15; i++) {
            ctx.fillRect(20 + i * 32, floorY + 5 + (i % 3) * 4, 8, 1);
        }
        drawPlatformsAndWalls('#8a7a5a', '#a09070');

    } else if (bg === 'starkiller') {
        // Starkiller Base — dark snowy forest at night, red glow in sky
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, W, H);
        // Red glow in sky from the weapon
        for (let y = 0; y < 60; y += 2) {
            const t = 1 - y / 60;
            ctx.fillStyle = `rgba(120,20,20,${t * 0.08})`;
            ctx.fillRect(0, y, W, 2);
        }
        // Stars
        for (const s of stars) {
            ctx.globalAlpha = s.brightness * 0.5;
            ctx.fillStyle = COLORS.star;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        }
        ctx.globalAlpha = 1;
        // Dark pine trees
        for (let i = 0; i < 8; i++) {
            const tx = 25 + i * 62;
            const th = 30 + (i % 3) * 15;
            // Trunk
            ctx.fillStyle = '#1a1010';
            ctx.fillRect(tx + 4, GROUND_Y + 56 - th, 4, th);
            // Triangle tree shape
            ctx.fillStyle = '#0a1a0a';
            ctx.beginPath();
            ctx.moveTo(tx + 6, GROUND_Y + 56 - th - 15);
            ctx.lineTo(tx - 5, GROUND_Y + 56 - th + 10);
            ctx.lineTo(tx + 17, GROUND_Y + 56 - th + 10);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(tx + 6, GROUND_Y + 56 - th - 5);
            ctx.lineTo(tx - 8, GROUND_Y + 56 - th + 20);
            ctx.lineTo(tx + 20, GROUND_Y + 56 - th + 20);
            ctx.fill();
        }
        // Snow on ground
        const floorY = GROUND_Y + 56;
        ctx.fillStyle = '#aabbcc';
        ctx.fillRect(0, floorY, W, H - floorY);
        ctx.fillStyle = '#bbccdd';
        ctx.fillRect(0, floorY, W, 2);
        // Snow patches
        ctx.fillStyle = '#99aabb';
        for (let x = 10; x < W; x += 35) {
            ctx.fillRect(x, floorY + 4, 15, 2);
        }
        // Falling snow particles
        ctx.fillStyle = '#ddeeff';
        for (let i = 0; i < 20; i++) {
            const sx = (i * 47 + gameTime * 15) % W;
            const sy = (i * 31 + gameTime * 25) % (GROUND_Y + 50);
            ctx.globalAlpha = 0.4 + (i % 3) * 0.2;
            ctx.fillRect(sx, sy, 1, 1);
        }
        ctx.globalAlpha = 1;
        drawPlatformsAndWalls('#8898a8', '#a0b0c0');

    } else {
        // Default: Death Star
        drawStarsAndSky(COLORS.sky);
        drawDeathStar();
        for (const t of tieSquads) {
            drawTie(t.x, t.y);
        }
        drawMetalFloor();
        drawPlatformsAndWalls();
    }
}

// TITLE SCREEN
